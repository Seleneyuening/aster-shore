<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#faf8f3">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<title>身份投票</title>
<style>
  :root{
    --bg:#faf8f3;
    --card:rgba(255,255,255,.72);
    --ink:#3c3a35;
    --sub:#9d978b;
    --faint:#c4beb1;
    --line:#eae4d8;
    --accent:#8f9d8a;
    --accent-soft:#eef1ec;
    --warm:#f3ede1;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{font-size:16px}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,"PingFang SC","Hiragino Sans GB","Noto Sans SC",sans-serif;
    font-weight:300;
    letter-spacing:.02em;
    line-height:1.7;
    min-height:100vh;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  #app{max-width:480px;margin:0 auto;padding:28px 22px 96px}
  h1{font-size:1.05rem;font-weight:300;letter-spacing:.35em;color:var(--sub)}
  .date{font-size:.8rem;color:var(--faint);margin-top:4px;letter-spacing:.12em}
  .motto{font-size:.82rem;color:var(--sub);margin:26px 0 8px;letter-spacing:.06em}

  /* ---------- 卡片 ---------- */
  .card{
    background:var(--card);
    -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
    border:1px solid var(--line);
    border-radius:18px;
    padding:24px 22px 20px;
    margin-top:18px;
    transition:opacity .25s ease;
    cursor:pointer;
  }
  .card:active{opacity:.75}
  .card .status{font-size:.72rem;letter-spacing:.14em;color:var(--faint);display:flex;justify-content:space-between;align-items:center}
  .card.voted .status{color:var(--accent)}
  .card .statement{font-size:1.18rem;font-weight:300;margin-top:12px;line-height:1.55}
  .card .meaning{font-size:.82rem;color:var(--sub);margin-top:8px}
  .minbox{
    margin-top:18px;
    background:var(--warm);
    border-radius:12px;
    padding:12px 14px;
  }
  .minbox .minlabel{font-size:.68rem;letter-spacing:.2em;color:var(--sub)}
  .minbox .mintext{font-size:.98rem;font-weight:400;margin-top:3px}
  .minbox .minhint{font-size:.7rem;color:var(--accent);margin-top:5px;letter-spacing:.1em}
  .break{
    margin-top:14px;font-size:.8rem;color:var(--sub);
    border-top:1px solid var(--line);padding-top:12px;
  }
  .break .q{color:var(--ink);font-weight:400}
  .break a{color:var(--accent);text-decoration:none;border-bottom:1px solid var(--accent-soft);display:inline-block;padding:6px 2px;margin:-6px -2px}

  /* ---------- 按钮 ---------- */
  .btn{
    display:block;width:100%;
    padding:14px;
    border:none;border-radius:14px;
    font-size:.92rem;font-weight:300;letter-spacing:.15em;
    font-family:inherit;
    background:var(--accent);color:#fff;
    cursor:pointer;
  }
  .btn.ghost{background:transparent;color:var(--sub);border:1px dashed var(--faint)}
  .btn.quiet{background:transparent;color:var(--sub)}
  .btn:active{opacity:.8}
  .btn+.btn{margin-top:10px}

  .addlink{
    display:block;text-align:center;margin-top:22px;
    padding:16px;border:1px dashed var(--faint);border-radius:18px;
    color:var(--sub);font-size:.85rem;letter-spacing:.2em;cursor:pointer;
  }
  .footlink{display:block;text-align:center;margin-top:34px;color:var(--faint);font-size:.78rem;letter-spacing:.2em;cursor:pointer}
  .datalinks{display:flex;justify-content:center;gap:26px;margin-top:16px}
  .datalinks span{color:var(--faint);font-size:.7rem;letter-spacing:.15em;cursor:pointer;padding:6px}

  /* ---------- 表单 ---------- */
  label{display:block;font-size:.72rem;letter-spacing:.2em;color:var(--sub);margin:24px 0 6px}
  input[type=text],textarea{
    width:100%;background:var(--card);border:1px solid var(--line);
    border-radius:12px;padding:12px 14px;
    font:inherit;font-weight:300;color:var(--ink);resize:none;
  }
  input:focus,textarea:focus{outline:none;border-color:var(--accent)}
  .hint{font-size:.72rem;color:var(--faint);margin-top:5px}
  .back{color:var(--sub);font-size:.82rem;letter-spacing:.15em;cursor:pointer;display:inline-block;margin-bottom:6px}
  .danger{color:#b98b7f}

  /* ---------- 证据页 ---------- */
  .bignum{font-size:2.6rem;font-weight:200;letter-spacing:.05em}
  .bignum small{font-size:.78rem;color:var(--sub);letter-spacing:.2em;font-weight:300}
  .sect{font-size:.72rem;letter-spacing:.25em;color:var(--sub);margin:34px 0 12px}
  .heatmap{display:grid;grid-template-rows:repeat(7,1fr);grid-auto-flow:column;gap:4px;justify-content:start}
  .cell{width:13px;height:13px;border-radius:4px;background:#efeadf}
  .cell.on{background:var(--accent)}
  .cell.today{box-shadow:0 0 0 1.5px var(--faint) inset}
  .cell.future{background:transparent}
  .strip{
    display:flex;gap:12px;overflow-x:auto;
    scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;
    margin:0 -22px;padding:0 22px 8px;
  }
  .strip::-webkit-scrollbar{display:none}
  .shot{flex:0 0 68%;scroll-snap-align:center}
  .shot img{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:14px;border:1px solid var(--line);display:block}
  .shot .cap{font-size:.72rem;color:var(--faint);text-align:center;margin-top:6px;letter-spacing:.12em}
  .swipehint{font-size:.7rem;color:var(--faint);margin-top:6px;letter-spacing:.1em}

  /* ---------- 底部弹层 / 弹窗 ---------- */
  .mask{
    position:fixed;inset:0;background:rgba(60,58,53,.28);
    display:flex;align-items:flex-end;justify-content:center;z-index:50;
  }
  .mask.center{align-items:center;padding:22px}
  .sheet{
    background:var(--bg);width:100%;max-width:480px;
    border-radius:22px 22px 0 0;
    padding:26px 24px calc(30px + env(safe-area-inset-bottom));
  }
  .mask.center .sheet{border-radius:22px;padding-bottom:26px}
  .sheet h2{font-size:1rem;font-weight:300;letter-spacing:.1em}
  .sheet .sub{font-size:.8rem;color:var(--sub);margin-top:6px}
  .sheet .minbox{margin:18px 0 22px}
  .weekline{display:flex;justify-content:space-between;align-items:baseline;padding:12px 0;border-bottom:1px solid var(--line);font-size:.88rem}
  .weekline b{font-weight:400;font-size:1.3rem}

  /* ---------- 灯箱 / 提示 ---------- */
  .lightbox{position:fixed;inset:0;background:rgba(30,29,26,.92);z-index:60;display:flex;align-items:center;justify-content:center}
  .lightbox img{max-width:94%;max-height:88%;border-radius:10px}
  #toast{
    position:fixed;left:50%;bottom:calc(34px + env(safe-area-inset-bottom));
    transform:translateX(-50%);
    background:rgba(60,58,53,.88);color:#faf8f3;
    font-size:.78rem;letter-spacing:.08em;
    padding:10px 18px;border-radius:99px;
    opacity:0;pointer-events:none;transition:opacity .3s;z-index:70;
    white-space:nowrap;max-width:88vw;overflow:hidden;text-overflow:ellipsis;
  }
  #toast.show{opacity:1}
  .empty{color:var(--sub);font-size:.85rem;margin-top:46px;text-align:center;line-height:2.1}
</style>
</head>
<body>
<div id="app"></div>
<input type="file" id="file" accept="image/*" hidden>
<input type="file" id="importFile" accept="application/json,.json" hidden>
<div id="toast"></div>

<script>
'use strict';
/* ============ 数据 ============ */
const KEY = 'identityVotes.v1';
let db = load();
function load(){
  try{ const d = JSON.parse(localStorage.getItem(KEY)); if(d && d.identities) return d; }catch(e){}
  return { identities:[], votes:{}, weekShown:'' };
}
function save(){
  try{ localStorage.setItem(KEY, JSON.stringify(db)); }
  catch(e){ toast('存储空间不足，本次照片未能保存'); }
}

/* ============ 日期 ============ */
function fmt(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function todayStr(){ return fmt(new Date()); }
function addDays(s,n){ const d=new Date(s+'T12:00:00'); d.setDate(d.getDate()+n); return fmt(d); }
function mondayOf(s){ const d=new Date(s+'T12:00:00'); d.setDate(d.getDate()-((d.getDay()+6)%7)); return fmt(d); }
function cnDate(s){
  const d=new Date(s+'T12:00:00');
  const w=['日','一','二','三','四','五','六'][d.getDay()];
  return (d.getMonth()+1)+'月'+d.getDate()+'日 星期'+w;
}
function shortDate(s){ const p=s.split('-'); return (+p[1])+'月'+(+p[2])+'日'; }

/* ============ 工具 ============ */
function esc(t){ return String(t??'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),2600);
}
function votesOf(id){ return db.votes[id]||{}; }
function totalVotes(id){ return Object.keys(votesOf(id)).length; }
function votedToday(id){ return !!votesOf(id)[todayStr()]; }
function missedStreak(idn){
  // 今天之前连续未投的天数（最多探测到 2 即可）
  const created=(idn.createdAt||todayStr()).slice(0,10);
  let d=addDays(todayStr(),-1), n=0;
  while(d>=created && n<2){
    if(votesOf(idn.id)[d]) break;
    n++; d=addDays(d,-1);
  }
  return n;
}
function countRange(from,to){
  let n=0;
  for(const id in db.votes)
    for(const day in db.votes[id])
      if(day>=from && day<=to) n++;
  return n;
}

/* ============ 视图路由 ============ */
const app=document.getElementById('app');
let view={name:'home'};
function go(v){ view=v; render(); window.scrollTo(0,0); }
function render(){
  if(view.name==='home') renderHome();
  else if(view.name==='form') renderForm(view.id);
  else if(view.name==='evidence') renderEvidence(view.id);
}

/* ============ 首页 ============ */
function renderHome(){
  const t=todayStr();
  let h=`<h1>身份投票</h1><div class="date">${cnDate(t)}</div>
    <p class="motto">每一次行动，都是为你想成为的人投的一票。</p>`;

  if(db.identities.length===0){
    h+=`<div class="empty">还没有身份。<br>先写下一句「我是……的人」。</div>`;
  }

  for(const idn of db.identities){
    const voted=votedToday(idn.id), n=totalVotes(idn.id);
    let breakHtml='';
    if(!voted){
      const m=missedStreak(idn);
      if(m===1) breakHtml=`<div class="break">断一天是意外，明天继续。</div>`;
      else if(m>=2 && n>0) breakHtml=`<div class="break"><span class="q">这是新身份的开始吗？</span><br>你已经为这个身份投过 ${n} 票。<a data-ev="${idn.id}">看看你的历史证据 →</a></div>`;
    }
    h+=`<div class="card${voted?' voted':''}" data-vote="${idn.id}">
      <div class="status"><span>${voted?'✓ 今天已投':'今天还没投票'}</span><span>累计 ${n} 票</span></div>
      <div class="statement">${esc(idn.statement)}</div>
      <div class="meaning">${esc(idn.meaning)}</div>
      <div class="minbox">
        <div class="minlabel">最小完成标准</div>
        <div class="mintext">${esc(idn.minStandard)}</div>
        <div class="minhint">最小动作也算一票</div>
      </div>
      ${breakHtml}
    </div>`;
  }

  if(db.identities.length<3) h+=`<div class="addlink" id="add">＋ 新的身份</div>`;
  h+=`<div class="footlink" id="weekly">本周回顾</div>
    <div class="datalinks"><span id="exp">导出数据</span><span id="imp">导入数据</span></div>`;
  app.innerHTML=h;

  app.querySelectorAll('[data-vote]').forEach(el=>{
    el.onclick=()=>{ const id=el.dataset.vote;
      votedToday(id) ? go({name:'evidence',id}) : openVoteSheet(id); };
  });
  app.querySelectorAll('[data-ev]').forEach(el=>{
    el.onclick=e=>{ e.stopPropagation(); go({name:'evidence',id:el.dataset.ev}); };
  });
  const add=document.getElementById('add');
  if(add) add.onclick=()=>go({name:'form'});
  document.getElementById('weekly').onclick=()=>openWeekly(false);
  document.getElementById('exp').onclick=exportData;
  document.getElementById('imp').onclick=importData;

  maybeAutoWeekly();
}

/* ============ 投票弹层 ============ */
function openVoteSheet(id){
  const idn=db.identities.find(x=>x.id===id); if(!idn) return;
  const m=openMask(`
    <h2>${esc(idn.statement)}</h2>
    <div class="sub">${esc(idn.meaning)}</div>
    <div class="minbox">
      <div class="minlabel">最小完成标准</div>
      <div class="mintext">${esc(idn.minStandard)}</div>
      <div class="minhint">做到这一点，就值得投票 —— 最小动作也算一票</div>
    </div>
    <button class="btn" id="v1">投下这一票</button>
    <button class="btn ghost" id="v2">附上一张照片再投</button>
    <button class="btn quiet" id="v0">先不投</button>
  `);
  m.querySelector('#v1').onclick=()=>{ close(m); castVote(id,null); };
  m.querySelector('#v2').onclick=()=>{ pickPhoto(p=>{ close(m); castVote(id,p); }); };
  m.querySelector('#v0').onclick=()=>close(m);
}
function castVote(id,photo){
  if(!db.votes[id]) db.votes[id]={};
  db.votes[id][todayStr()]={ p:photo||null, t:Date.now() };
  save();
  render();
  toast('✓ 已投一票 · 累计 '+totalVotes(id)+' 票');
}
function pickPhoto(cb){
  const inp=document.getElementById('file');
  inp.onchange=e=>{
    const f=e.target.files[0]; inp.value='';
    if(!f) return;
    const img=new Image(), url=URL.createObjectURL(f);
    img.onload=()=>{
      const MAX=900, s=Math.min(1,MAX/Math.max(img.width,img.height));
      const c=document.createElement('canvas');
      c.width=Math.round(img.width*s); c.height=Math.round(img.height*s);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      URL.revokeObjectURL(url);
      cb(c.toDataURL('image/jpeg',0.6));
    };
    img.onerror=()=>{ URL.revokeObjectURL(url); toast('照片读取失败'); };
    img.src=url;
  };
  inp.click();
}

/* ============ 新建 / 编辑 ============ */
function renderForm(id){
  const idn=id ? db.identities.find(x=>x.id===id) : null;
  app.innerHTML=`
    <span class="back" id="back">← 返回</span>
    <h1>${idn?'编辑身份':'新的身份'}</h1>
    <label>身份陈述</label>
    <input type="text" id="f1" placeholder="我是每天练妆的人" value="${esc(idn?.statement||'')}">
    <label>意义连接</label>
    <textarea id="f2" rows="2" placeholder="因为一年后我想成为外表由自己定义的人">${esc(idn?.meaning||'')}</textarea>
    <label>最小完成标准</label>
    <input type="text" id="f3" placeholder="画一边眉毛也算">
    <div class="hint">定得越小越好 —— 最小动作也算一票。</div>
    <div style="margin-top:36px">
      <button class="btn" id="ok">保存</button>
      ${idn?'<button class="btn quiet danger" id="del">删除这个身份及其记录</button>':''}
    </div>`;
  document.getElementById('f3').value=idn?.minStandard||'';
  document.getElementById('back').onclick=()=>go(idn?{name:'evidence',id}:{name:'home'});
  document.getElementById('ok').onclick=()=>{
    const s=v=>document.getElementById(v).value.trim();
    if(!s('f1')){ toast('先写下身份陈述'); return; }
    if(idn){
      Object.assign(idn,{statement:s('f1'),meaning:s('f2'),minStandard:s('f3')||'出现一下也算'});
    }else{
      db.identities.push({
        id:'i'+Date.now(), statement:s('f1'), meaning:s('f2'),
        minStandard:s('f3')||'出现一下也算', createdAt:todayStr()
      });
    }
    save(); go({name:'home'});
  };
  const del=document.getElementById('del');
  if(del) del.onclick=()=>{
    if(!confirm('删除后该身份的全部投票和照片将无法恢复，确定吗？')) return;
    db.identities=db.identities.filter(x=>x.id!==id);
    delete db.votes[id];
    save(); go({name:'home'});
  };
}

/* ============ 证据页 ============ */
function renderEvidence(id){
  const idn=db.identities.find(x=>x.id===id);
  if(!idn){ go({name:'home'}); return; }
  const vs=votesOf(id), n=totalVotes(id), t=todayStr();

  // 近12周热力图（列为周，周一在上）
  let cells='';
  const start=mondayOf(addDays(t,-77));
  for(let w=0;w<12;w++) for(let d=0;d<7;d++){
    const day=addDays(start,w*7+d);
    let cls='cell';
    if(day>t) cls+=' future';
    else{ if(vs[day]) cls+=' on'; if(day===t) cls+=' today'; }
    cells+=`<div class="${cls}"></div>`;
  }

  // 照片时间轴（按日期升序，可左右滑动对比）
  const photos=Object.keys(vs).filter(d=>vs[d].p).sort();
  let strip='';
  if(photos.length){
    strip=`<div class="sect">照片时间轴</div><div class="strip">`+
      photos.map(d=>`<div class="shot"><img src="${vs[d].p}" data-full="${d}" alt=""><div class="cap">${shortDate(d)}</div></div>`).join('')+
      `</div>`+(photos.length>1?`<div class="swipehint">← 左右滑动，和过去的自己对比 →</div>`:'');
  }

  app.innerHTML=`
    <span class="back" id="back">← 返回</span>
    <h1>证据</h1>
    <div style="margin-top:22px">
      <div class="statement" style="font-size:1.15rem">${esc(idn.statement)}</div>
      <div class="meaning" style="font-size:.82rem;color:var(--sub);margin-top:6px">${esc(idn.meaning)}</div>
    </div>
    <div style="margin-top:26px" class="bignum">${n} <small>票 · 自 ${shortDate(idn.createdAt)}</small></div>
    <div class="sect">近 12 周</div>
    <div class="heatmap">${cells}</div>
    ${strip}
    <div style="margin-top:44px">
      <button class="btn ghost" id="edit">编辑这个身份</button>
    </div>`;
  document.getElementById('back').onclick=()=>go({name:'home'});
  document.getElementById('edit').onclick=()=>go({name:'form',id});
  app.querySelectorAll('[data-full]').forEach(img=>{
    img.onclick=()=>{
      const lb=document.createElement('div');
      lb.className='lightbox';
      lb.innerHTML=`<img src="${img.src}">`;
      lb.onclick=()=>lb.remove();
      document.body.appendChild(lb);
    };
  });
}

/* ============ 周回顾 ============ */
function weekKey(){ return mondayOf(todayStr()); }
function maybeAutoWeekly(){
  const now=new Date();
  if(now.getDay()===0 && now.getHours()>=18 && db.weekShown!==weekKey()){
    openWeekly(true);
  }
}
function openWeekly(auto){
  const mon=weekKey(), t=todayStr();
  const cur=countRange(mon,t);
  const prev=countRange(addDays(mon,-7),addDays(mon,-1));
  const diff=cur-prev;
  let line;
  if(prev===0 && cur===0) line='这一周很安静。新的一周，从最小的一票开始。';
  else if(diff>0) line=`比上周多投了 ${diff} 票。你正在变成你投票的那个人。`;
  else if(diff===0) line='和上周持平。稳定本身就是一种证据。';
  else line=`比上周少了 ${-diff} 票。票数会波动，身份还在。`;
  const m=openMask(`
    <h2>本周回顾</h2>
    <div class="sub">${cnDate(t)} · 只和自己比</div>
    <div style="margin-top:16px">
      <div class="weekline"><span>本周</span><b>${cur} 票</b></div>
      <div class="weekline"><span>上周</span><b>${prev} 票</b></div>
    </div>
    <p class="sub" style="margin:18px 0 22px">${line}</p>
    <button class="btn" id="wok">好</button>
  `, true);
  m.querySelector('#wok').onclick=()=>close(m);
  if(auto){ db.weekShown=weekKey(); save(); }
}

/* ============ 数据导出 / 导入 ============ */
function exportData(){
  const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='身份投票备份-'+todayStr()+'.json';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),5000);
  toast('已导出备份文件');
}
function importData(){
  const inp=document.getElementById('importFile');
  inp.onchange=e=>{
    const f=e.target.files[0]; inp.value='';
    if(!f) return;
    const r=new FileReader();
    r.onload=()=>{
      try{
        const d=JSON.parse(r.result);
        if(!d || !Array.isArray(d.identities) || typeof d.votes!=='object') throw 0;
        if(!confirm('导入将覆盖当前的全部身份和投票记录，确定吗？')) return;
        db=d; save(); go({name:'home'});
        toast('导入完成');
      }catch(err){ toast('文件格式不对，导入失败'); }
    };
    r.readAsText(f);
  };
  inp.click();
}

/* ============ 弹层通用 ============ */
function openMask(html,center){
  const m=document.createElement('div');
  m.className='mask'+(center?' center':'');
  m.innerHTML=`<div class="sheet">${html}</div>`;
  m.onclick=e=>{ if(e.target===m) close(m); };
  document.body.appendChild(m);
  return m;
}
function close(m){ m.remove(); }

render();
</script>
